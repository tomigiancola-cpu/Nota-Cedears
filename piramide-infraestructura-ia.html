<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Las seis capas de la infraestructura de IA</title>
<style>
:root{
  --bg:#faf9f7;
  --text-primary:#0b0b0b;
  --text-secondary:#52514e;
  --text-muted:#898781;
  --border:rgba(11,11,11,0.14);
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#141413;
    --text-primary:#ffffff;
    --text-secondary:#c3c2b7;
    --text-muted:#898781;
    --border:rgba(255,255,255,0.16);
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  font-family:var(--font-sans);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  padding:2rem 1rem;
}
.wrap{max-width:760px;margin:0 auto}
.head{margin:0 0 1.75rem;padding:0 4px}
.kicker{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;
}
h1{
  font-family:Georgia,"Times New Roman",serif;
  font-size:27px;font-weight:500;line-height:1.25;
  margin:0;color:var(--text-primary);
}
.dek{
  font-size:14px;line-height:1.6;color:var(--text-secondary);
  margin:10px 0 0;max-width:560px;
}
svg{display:block;width:100%;height:auto}
.th{font-family:var(--font-sans);font-size:14px;font-weight:500;fill:var(--text-primary)}
.muted{fill:var(--text-muted)}
.soft{fill:var(--text-secondary)}
.leader{stroke:var(--border);stroke-width:.5;stroke-dasharray:2 3;fill:none}
</style>
</head>
<body>
<div class="wrap">

<div class="head">
  <div class="kicker">Anatomía del ciclo · 2026</div>
  <h1>Las seis capas de la infraestructura de IA</h1>
</div>

</div>
</body>
</html>
