const rows = DATA.map(r=>({sym:r[0],name:r[1],sector:r[2],adtv:r[3],trades:r[4],d:r[5],mtd:r[6],ytd:r[7],vol:r[8],tipo:r[9]}));
const SECTOR_ES={'Tecnologia':'Tecnología','Financieras':'Financieras','Materiales':'Materiales','Industriales':'Industriales','Salud':'Salud','Consumo Disc':'Consumo Discr.','Energia':'Energía','Comunicaciones':'Comunicaciones','Consumo Basico':'Consumo Básico','Servicios Publicos':'Serv. Públicos','ETF':'ETF'};
const SEC_ORDER=['Tecnologia','ETF','Industriales','Financieras','Energia','Materiales','Comunicaciones','Consumo Disc','Consumo Basico','Salud','Servicios Publicos'];

let curKey='mtd', curTipo='accion', focusSec=null;
const tt=document.getElementById('tt');
const wrap=document.getElementById('wrap'), svg=d3.select('svg');

function colReturn(v){
  if(v===null||v===undefined)return '#3a3f46';
  const c=[[-8,'#7d0a0a'],[-4,'#c62828'],[-1.5,'#e57373'],[-0.3,'#9c7676'],[0.3,'#5a5f66'],[1.5,'#7ea87e'],[4,'#43a047'],[8,'#1b7a32']];
  if(v<=c[0][0])return c[0][1]; if(v>=c[c.length-1][0])return c[c.length-1][1];
  for(let i=0;i<c.length-1;i++){if(v>=c[i][0]&&v<c[i+1][0])return c[i][1];} return '#5a5f66';
}
function color(r){return colReturn(r[curKey]);}
function val(r){return r[curKey];}
function fmtPct(v){return v===null||v===undefined?'s/d':(v>0?'+':'')+v.toFixed(2)+'%';}
function fmtM(v){return v>=1000?(v/1000).toFixed(1)+'MM':Math.round(v)+'M';}

let gZoom = svg.append('g').attr('class','zoomG');
const zoom = d3.zoom().scaleExtent([1,12])
  .filter(ev=> ev.type!=='dblclick')
  .on('zoom',ev=>{ gZoom.attr('transform',ev.transform); adaptText(ev.transform.k); });
svg.call(zoom);

function adaptText(k){
  gZoom.selectAll('.cell').each(function(d){
    const w=(d.x1-d.x0)*k, h=(d.y1-d.y0)*k, a=Math.min(w,h);
    const g=d3.select(this);
    g.select('.sym').style('display',(w<24||h<16)?'none':null)
      .style('font-size',((a>46?12.5:a>32?10.5:a>21?9:7.8)/k)+'px');
    g.select('.chg').style('display',(w<36||h<30)?'none':null)
      .style('font-size',((a>46?10.5:a>32?9:8)/k)+'px');
  });
  gZoom.selectAll('.sectorLabel').style('font-size',(11/k)+'px').style('stroke-width',(2.5/k)+'px');
}

function draw(){
  const W=wrap.clientWidth, H=Math.max(600,Math.min(820,W*0.72));
  svg.attr('viewBox','0 0 '+W+' '+H).attr('height',H);
  zoom.translateExtent([[0,0],[W,H]]);
  gZoom.selectAll('*').remove();

  const src=rows.filter(r=>r.adtv>0 && r.tipo===curTipo);
  const bySec=d3.group(src,d=>d.sector);
  const order = curTipo==='etf' ? Array.from(bySec.keys()) : SEC_ORDER;
  const children=[];
  for(const sec of order){ if(!bySec.has(sec))continue;
    children.push({name:sec,children:bySec.get(sec).map(r=>({...r,value:r.adtv}))}); }
  const root=d3.hierarchy({name:'root',children}).sum(d=>d.value).sort((a,b)=>b.value-a.value);
  d3.treemap().size([W,H]).paddingTop(19).paddingInner(1.5).round(true)(root);

  gZoom.selectAll('.sectorLabel').data(root.children).join('text')
    .attr('class','sectorLabel').attr('x',d=>d.x0+5).attr('y',d=>d.y0+13)
    .text(d=>{const w=d.x1-d.x0,t=(SECTOR_ES[d.data.name]||d.data.name).toUpperCase();return w>110?t:w>60?t.slice(0,7):w>32?t.slice(0,4):'';});

  const leaf=gZoom.selectAll('.cell').data(root.leaves()).join('g')
    .attr('class',d=>'cell'+(focusSec&&d.data.sector!==focusSec?' hide':''))
    .attr('transform',d=>'translate('+d.x0+','+d.y0+')');

  leaf.append('rect').attr('width',d=>Math.max(0,d.x1-d.x0)).attr('height',d=>Math.max(0,d.y1-d.y0)).attr('fill',d=>color(d.data));

  leaf.append('text').attr('class','sym').attr('x',3).attr('y',12)
    .style('font-size',d=>{const a=Math.min(d.x1-d.x0,d.y1-d.y0);return (a>46?12.5:a>32?10.5:a>21?9:7.8)+'px';})
    .text(d=>{const w=d.x1-d.x0,h=d.y1-d.y0;if(w<24||h<16)return'';return d.data.sym.length*6.3<w?d.data.sym:(w>16&&h>16?d.data.sym.slice(0,4):'');});

  leaf.append('text').attr('class','chg').attr('x',3).attr('y',24)
    .style('font-size',d=>{const a=Math.min(d.x1-d.x0,d.y1-d.y0);return (a>46?10.5:a>32?9:8)+'px';})
    .text(d=>{const w=d.x1-d.x0,h=d.y1-d.y0;if(w<36||h<30)return'';const v=val(d.data);if(v===null||v===undefined)return'';return (v>0?'+':'')+v.toFixed(1)+'%';});

  leaf.on('mousemove',(e,d)=>{const r=d.data;tt.style.opacity=1;
      tt.innerHTML='<h3><span>'+r.sym+'</span><span style="color:'+color(r)+'">'+fmtPct(val(r))+'</span></h3>'+
        '<div class="co">'+r.name+' · '+(SECTOR_ES[r.sector]||r.sector)+'</div>'+
        '<div class="row"><span>Día</span><b style="color:'+colReturn(r.d)+'">'+fmtPct(r.d)+'</b></div>'+
        '<div class="row"><span>Mes (MTD)</span><b style="color:'+colReturn(r.mtd)+'">'+fmtPct(r.mtd)+'</b></div>'+
        '<div class="row"><span>Año (YTD)</span><b style="color:'+colReturn(r.ytd)+'">'+fmtPct(r.ytd)+'</b></div>'+
        '<div class="sep"></div>'+
        '<div class="row"><span>Liquidez ADTV</span><b>$'+fmtM(r.adtv/1e6)+'</b></div>'+
        '<div class="row"><span>Operaciones</span><b>'+r.trades.toLocaleString('es')+'</b></div>';
      let x=e.clientX+14,y=e.clientY+14; if(x+230>innerWidth)x=e.clientX-230; if(y+170>innerHeight)y=e.clientY-170;
      tt.style.left=x+'px';tt.style.top=y+'px';})
    .on('mouseleave',()=>tt.style.opacity=0)
    .on('click',(e,d)=>{focusSec=focusSec===d.data.sector?null:d.data.sector;draw();});
}

function legend(){const L=document.getElementById('legend');
  const s=[['≤-8%','#7d0a0a'],['-4','#c62828'],['-1.5','#e57373'],['0','#5a5f66'],['+1.5','#7ea87e'],['+4','#43a047'],['≥+8%','#1b7a32']];
  L.innerHTML='<span>Variación&nbsp;</span>'+s.map(x=>'<span class="sw" style="background:'+x[1]+'"></span><span style="margin-right:6px">'+x[0]+'</span>').join('');}

document.querySelectorAll('#tipo button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#tipo button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curTipo=b.dataset.t;focusSec=null;svg.call(zoom.transform,d3.zoomIdentity);draw();});
document.querySelectorAll('#scale button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#scale button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curKey=b.dataset.k;draw();legend();});
document.getElementById('zin').onclick=()=>svg.transition().duration(200).call(zoom.scaleBy,1.6);
document.getElementById('zout').onclick=()=>svg.transition().duration(200).call(zoom.scaleBy,0.625);
document.getElementById('zreset').onclick=()=>svg.transition().duration(250).call(zoom.transform,d3.zoomIdentity);
svg.on('dblclick',()=>{focusSec=null;draw();svg.transition().duration(250).call(zoom.transform,d3.zoomIdentity);});

draw();legend();
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(draw,150)});
</script>
</body>
</html>
