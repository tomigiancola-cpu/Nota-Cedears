<meta charset="utf-8">
<title>Aranceles Sección 301 — Trabajo Forzoso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --ink:#12161c;
    --paper:#eceae4;
    --rule:#c3bfb4;
    --t10:#2f6f6b;
    --tmfn:#c98a2e;
    --t125:#a33b2a;
    --none:#d7d4cc;
    --quota:#1b1f26;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Archivo',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:22px 22px 40px}

  h1{
    font-size:clamp(24px,3.6vw,36px);line-height:1.05;margin:0 0 16px;
    font-weight:800;letter-spacing:-.025em;max-width:19ch
  }

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
  .key{
    display:flex;align-items:center;gap:8px;background:#fff;
    border:1px solid var(--rule);padding:7px 11px;cursor:pointer;
    font-size:12.5px;font-weight:600;transition:.15s;user-select:none;
  }
  .key:hover{border-color:var(--ink)}
  .key.off{opacity:.35}
  .key .sw{width:13px;height:13px;border:1px solid rgba(0,0,0,.32)}
  .key .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6b7280;font-weight:500}

  .stage{position:relative;background:#fff;border:1px solid var(--rule)}
  svg{display:block;width:100%;height:auto;cursor:grab}
  svg:active{cursor:grabbing}
  .country{stroke:#fff;stroke-width:.4;transition:opacity .12s}
  .country.hit{stroke:var(--ink);stroke-width:1.4}
  .country.dim{opacity:.28}
  .quota-dot{pointer-events:none}

  .hint{
    position:absolute;left:12px;bottom:10px;font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;color:#8b8f98;letter-spacing:.05em;pointer-events:none
  }

  #tip{
    position:fixed;pointer-events:none;opacity:0;z-index:50;
    background:var(--ink);color:#f4f2ec;padding:12px 14px;max-width:290px;
    border-left:4px solid var(--t125);transition:opacity .1s;
  }
  #tip .nm{font-size:15px;font-weight:800;letter-spacing:-.01em;margin-bottom:7px}
  #tip .rate{
    font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;
    line-height:1;margin-bottom:8px
  }
  #tip .why{font-size:11.5px;line-height:1.45;color:#b9bcc4}
  #tip .tag{
    display:inline-block;margin-top:9px;font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;letter-spacing:.11em;text-transform:uppercase;
    background:#f4f2ec;color:var(--ink);padding:3px 7px
  }

  .source{
    margin:14px 2px 0;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
    letter-spacing:.02em;color:#767c86;line-height:1.5
  }
  @media(max-width:600px){ .hint{display:none} }
</style>

<div class="wrap">
  <h1>60 economías, tres escalas de arancel</h1>

  <div class="legend" id="legend"></div>

  <div class="stage">
    <svg id="map" viewBox="0 0 960 500" role="img" aria-label="Mapa mundial de aranceles"></svg>
    <div class="hint">arrastrá para mover · rueda para zoom</div>
  </div>

  <p class="source">Fuente: USTR, Notice of Actions in Section 301 Investigations (Docket Nos. USTR–2026–0265, USTR–2026–0266), Federal Register, 23 de julio de 2026.</p>
</div>

<div id="tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const T10  = {id:'t10',  label:'10% sobre todos los bienes', color:'#2f6f6b'};
const TMFN = {id:'tmfn', label:'Neto de MFN (tope 10% / 12,5%)', color:'#c98a2e'};
const T125 = {id:'t125', label:'12,5% sobre todos los bienes', color:'#a33b2a'};
const TIERS = [T10, TMFN, T125];

const R_NEW   = 'Impuso la prohibición de importación después del 5 de junio de 2026.';
const R_HAS   = 'Ya tenía una prohibición de importación vigente, o un régimen parcial equivalente.';
const R_ENF   = 'Tiene la prohibición pero no la hizo cumplir de forma efectiva.';
const R_NONE  = 'No impuso ninguna prohibición de importación de bienes con trabajo forzoso ni la hizo cumplir.';

// key = name in world-atlas; d = data
const D = {
  // ---- 10% ----
  'Argentina':      [T10, R_HAS, 0, 'Exenciones específicas de producto'],
  'Bangladesh':     [T10, R_HAS, 1, 'Cuota textil (TRQ)'],
  'Cambodia':       [T10, R_NEW, 1, 'Cuota textil (TRQ)'],
  'Canada':         [T10, R_ENF, 0, ''],
  'Ecuador':        [T10, R_ENF, 0, 'Exenciones específicas de producto'],
  'El Salvador':    [T10, R_HAS, 0, 'Exenciones específicas de producto'],
  'Guatemala':      [T10, R_NEW, 0, 'Exenciones específicas de producto'],
  'Honduras':       [T10, R_NEW, 0, ''],
  'India':          [T10, R_NEW, 0, ''],
  'Indonesia':      [T10, R_ENF, 1, 'Cuota textil (TRQ)'],
  'Jordan':         [T10, 'Asumió compromisos sobre trabajo forzoso mediante un Acuerdo de Comercio Recíproco (ART).', 0, 'Exenciones específicas de producto'],
  'Malaysia':       [T10, R_HAS, 1, 'Cuota textil (TRQ)'],
  'Mexico':         [T10, R_ENF, 0, ''],
  'Pakistan':       [T10, R_ENF, 0, ''],
  'Sri Lanka':      [T10, R_NEW, 0, ''],
  'Trinidad and Tobago':[T10, R_NEW, 0, ''],
  'United Kingdom': [T10, R_HAS, 0, 'Exenciones específicas de producto'],

  // ---- neto de MFN ----
  'Taiwan':         [TMFN, 'Tope combinado del 10%: el 301 completa hasta llegar al 10% junto con el MFN.', 0, 'Tope 10%'],
  'Japan':          [TMFN, 'Tope combinado del 12,5%: el 301 completa hasta llegar al 12,5% junto con el MFN.', 0, 'Tope 12,5%'],
  'South Korea':    [TMFN, 'Tope combinado del 12,5%: el 301 completa hasta llegar al 12,5% junto con el MFN.', 0, 'Tope 12,5%'],
  'Switzerland':    [TMFN, 'Tope combinado del 12,5%: el 301 completa hasta llegar al 12,5% junto con el MFN.', 0, 'Tope 12,5%'],

  // ---- 12,5% ----
  'Algeria':[T125,R_NONE,0,''], 'Angola':[T125,R_NONE,0,''], 'Australia':[T125,R_NONE,0,''],
  'Bahamas':[T125,R_NONE,0,''], 'Bahrain':[T125,R_NONE,0,''], 'Brazil':[T125,R_NONE,0,''],
  'Chile':[T125,R_NONE,0,''], 'China':[T125,R_NONE,0,''], 'Colombia':[T125,R_NONE,0,''],
  'Costa Rica':[T125,R_NONE,0,''], 'Dominican Republic':[T125,R_NONE,0,''],
  'Egypt':[T125,R_NONE,0,''], 'Guyana':[T125,R_NONE,0,''], 'Iraq':[T125,R_NONE,0,''],
  'Israel':[T125,R_NONE,0,''], 'Kazakhstan':[T125,R_NONE,0,''], 'Kuwait':[T125,R_NONE,0,''],
  'Libya':[T125,R_NONE,0,''], 'Morocco':[T125,R_NONE,0,''], 'New Zealand':[T125,R_NONE,0,''],
  'Nicaragua':[T125,R_NONE,0,''], 'Nigeria':[T125,R_NONE,0,''], 'Norway':[T125,R_NONE,0,''],
  'Oman':[T125,R_NONE,0,''], 'Peru':[T125,R_NONE,0,''], 'Philippines':[T125,R_NONE,0,''],
  'Qatar':[T125,R_NONE,0,''], 'Russia':[T125,R_NONE,0,''], 'Saudi Arabia':[T125,R_NONE,0,''],
  'Singapore':[T125,R_NONE,0,''], 'South Africa':[T125,R_NONE,0,''], 'Thailand':[T125,R_NONE,0,''],
  'Turkey':[T125,R_NONE,0,''], 'United Arab Emirates':[T125,R_NONE,0,''],
  'Uruguay':[T125,R_NONE,0,''], 'Venezuela':[T125,R_NONE,0,''], 'Vietnam':[T125,R_NONE,0,''],
};

// EU member states -> treated as the European Union entry (net of MFN, 10% cap)
const EU = ['Austria','Belgium','Bulgaria','Croatia','Cyprus','Czechia','Czech Republic','Denmark',
'Estonia','Finland','France','Germany','Greece','Hungary','Ireland','Italy','Latvia','Lithuania',
'Luxembourg','Malta','Netherlands','Poland','Portugal','Romania','Slovakia','Slovenia','Spain','Sweden'];
EU.forEach(c => D[c] = [TMFN,'Tope combinado del 10%: el 301 completa hasta llegar al 10% junto con el MFN. Se aplica como Unión Europea.',0,'Unión Europea · Tope 10%']);

// Hong Kong has no separate polygon in the 110m atlas — noted in the China entry
D['China'][1] = R_NONE + ' Hong Kong figura como economía investigada aparte, con la misma tasa.';

const ES = {
 'Algeria':'Argelia','Angola':'Angola','Argentina':'Argentina','Australia':'Australia','Austria':'Austria',
 'Bahamas':'Bahamas','Bahrain':'Baréin','Bangladesh':'Bangladesh','Belgium':'Bélgica','Brazil':'Brasil',
 'Bulgaria':'Bulgaria','Cambodia':'Camboya','Canada':'Canadá','Chile':'Chile','China':'China',
 'Colombia':'Colombia','Costa Rica':'Costa Rica','Croatia':'Croacia','Cyprus':'Chipre','Czechia':'Chequia',
 'Czech Republic':'Chequia','Denmark':'Dinamarca','Dominican Republic':'República Dominicana',
 'Ecuador':'Ecuador','Egypt':'Egipto','El Salvador':'El Salvador','Estonia':'Estonia','Finland':'Finlandia',
 'France':'Francia','Germany':'Alemania','Greece':'Grecia','Guatemala':'Guatemala','Guyana':'Guyana',
 'Honduras':'Honduras','Hungary':'Hungría','India':'India','Indonesia':'Indonesia','Iraq':'Irak',
 'Ireland':'Irlanda','Israel':'Israel','Italy':'Italia','Japan':'Japón','Jordan':'Jordania',
 'Kazakhstan':'Kazajistán','Kuwait':'Kuwait','Latvia':'Letonia','Libya':'Libia','Lithuania':'Lituania',
 'Luxembourg':'Luxemburgo','Malaysia':'Malasia','Malta':'Malta','Mexico':'México','Morocco':'Marruecos',
 'Netherlands':'Países Bajos','New Zealand':'Nueva Zelanda','Nicaragua':'Nicaragua','Nigeria':'Nigeria',
 'Norway':'Noruega','Oman':'Omán','Pakistan':'Pakistán','Peru':'Perú','Philippines':'Filipinas',
 'Poland':'Polonia','Portugal':'Portugal','Qatar':'Catar','Romania':'Rumania','Russia':'Rusia',
 'Saudi Arabia':'Arabia Saudita','Singapore':'Singapur','Slovakia':'Eslovaquia','Slovenia':'Eslovenia',
 'South Africa':'Sudáfrica','South Korea':'Corea del Sur','Spain':'España','Sri Lanka':'Sri Lanka',
 'Sweden':'Suecia','Switzerland':'Suiza','Taiwan':'Taiwán','Thailand':'Tailandia',
 'Trinidad and Tobago':'Trinidad y Tobago','Turkey':'Türkiye','United Arab Emirates':'Emiratos Árabes Unidos',
 'United Kingdom':'Reino Unido','Uruguay':'Uruguay','Venezuela':'Venezuela','Vietnam':'Vietnam'
};

const RATE = {t10:'10%', tmfn:'10% o 12,5%', t125:'12,5%'};

// ---- legend ----
const counts = {t10:17, tmfn:5, t125:38};
const off = new Set();
const legend = d3.select('#legend');
TIERS.forEach(t=>{
  legend.append('div').attr('class','key').attr('data-t',t.id)
    .html(`<span class="sw" style="background:${t.color}"></span>${t.label} <span class="n">${counts[t.id]}</span>`)
    .on('click', function(){
      off.has(t.id) ? off.delete(t.id) : off.add(t.id);
      d3.select(this).classed('off', off.has(t.id));
      g.selectAll('.country').classed('dim', d => {
        const e = D[d.properties.name];
        return e ? off.has(e[0].id) : false;
      });
      g.selectAll('.quota-dot').style('opacity', off.has('t10') ? .15 : 1);
    });
});

// ---- map ----
const svg = d3.select('#map');
const W = 960, H = 500;
const proj = d3.geoNaturalEarth1().scale(178).translate([W/2, H/2 + 12]);
const path = d3.geoPath(proj);
const g = svg.append('g');

svg.call(d3.zoom().scaleExtent([1,9]).on('zoom', e => g.attr('transform', e.transform)));

const tip = document.getElementById('tip');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .catch(()=> d3.json('https://unpkg.com/world-atlas@2/countries-110m.json'))
  .then(render)
  .catch(()=> {
    d3.select('.stage').append('div')
      .style('padding','40px').style('font-size','13px')
      .text('No se pudo cargar la geometría del mapa. Verificá la conexión y recargá.');
  });

function render(world){
  const countries = topojson.feature(world, world.objects.countries).features;

  g.selectAll('.country')
    .data(countries).join('path')
    .attr('class','country')
    .attr('d', path)
    .attr('fill', d => { const e = D[d.properties.name]; return e ? e[0].color : '#d7d4cc'; })
    .on('mousemove', function(ev,d){
      const e = D[d.properties.name];
      if(!e){ tip.style.opacity = 0; return; }
      d3.select(this).classed('hit',true);
      tip.style.borderLeftColor = e[0].color;
      tip.innerHTML =
        `<div class="nm">${ES[d.properties.name] || d.properties.name}</div>`+
        `<div class="rate" style="color:${e[0].color}">${RATE[e[0].id]}</div>`+
        `<div class="why">${e[1]}</div>`+
        (e[3] ? `<span class="tag">${e[3]}</span>` : '');
      tip.style.opacity = 1;
      const pad = 16;
      let x = ev.clientX + pad, y = ev.clientY + pad;
      const r = tip.getBoundingClientRect();
      if(x + r.width  > innerWidth  - 8) x = ev.clientX - r.width  - pad;
      if(y + r.height > innerHeight - 8) y = ev.clientY - r.height - pad;
      tip.style.left = x+'px'; tip.style.top = y+'px';
    })
    .on('mouseleave', function(){
      d3.select(this).classed('hit',false);
      tip.style.opacity = 0;
    });

  // TRQ markers
  const trq = countries.filter(d => D[d.properties.name] && D[d.properties.name][2]);
  g.selectAll('.quota-dot').data(trq).join('circle')
    .attr('class','quota-dot')
    .attr('transform', d => `translate(${path.centroid(d)})`)
    .attr('r', 3.1).attr('fill','#12161c')
    .attr('stroke','#fff').attr('stroke-width',1);
}
</script>
